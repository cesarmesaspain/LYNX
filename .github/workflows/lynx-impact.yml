name: LYNX Impact

on:
  pull_request:
    branches: [main]

jobs:
  assess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Index LYNX
        run: node dist/cli.js index . --name LYNX --mode fast --incremental || true

      - name: Run assess_impact
        run: bash scripts/ci-assess.sh LYNX main
        env:
          GH_TOKEN: ${{ github.token }}
